services:
  - type: web
    name: ai-coding-mentor-backend
    env: docker
    rootDir: backend
    plan: free
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-coding-mentor-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: ai-coding-mentor-db
    databaseName: aimentordb
    user: aimentor
    plan: free
