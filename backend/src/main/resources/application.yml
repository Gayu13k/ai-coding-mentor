spring:
  application:
    name: ai-coding-mentor-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/ai_mentor_db;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:password}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:this-is-a-temporary-dev-secret-change-it-later-please-1234567890}
  expiration: 86400000

gemini:
  api-key: ${GEMINI_API_KEY:AQ.Ab8RN6LPjtJHCvD-w5pl648l8WHkXX5nlBuadkr4en11StBGyg}
  model: gemini-2.5-flash