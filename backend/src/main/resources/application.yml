spring:
  application:
    name: ai-coding-mentor-backend

  datasource:
    url: jdbc:h2:file:./data/ai_mentor_db;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
    username: sa
    password: password
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:this-is-a-temporary-dev-secret-change-it-later-please-1234567890}
  expiration: 86400000

gemini:
  api-key: ${GEMINI_API_KEY:AQ.Ab8RN6LPjtJHCvD-w5pl648l8WHkXX5nlBuadkr4en11StBGyg}
  model: gemini-2.5-flash