spring:
  application:
    name: ai-coding-mentor-backend

  datasource:
    url: jdbc:h2:mem:ai_mentor_db
    username: sa
    password: password
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  
  h2:
    console:
      enabled: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:this-is-a-temporary-dev-secret-change-it-later-please-1234567890}
  expiration: 86400000  # 24 hours in ms

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: gemini-2.5-flash
