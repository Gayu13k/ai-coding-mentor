spring:
  application:
    name: ai-coding-mentor-backend

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:this-is-a-temporary-dev-secret-change-it-later-please-1234567890}
  expiration: 86400000

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: gemini-2.5-flash